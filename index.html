<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minesweeper Chess</title>
    <link rel="icon" href="favicon.png">
    <style>
        @font-face {
            font-family: 'MineSweeperFont';
            src: url('mine-sweeper.otf.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
        }

        :root {
            --cell-light: #C4C4C4;  /* #e3c599 */  /* #EBECD0 */
            --cell-dark: #B0B0B0;   /* #cfaf89 */  /* #8eae6a */
            
            --cover-light: #ffffff;
            --cover-dark: #808080;
        }

        body {
            display: flex; flex-direction: column; align-items: center;
            font-family: Arial, sans-serif;
            background-color: #ffffff;
            color: white; margin: 0; padding: 20px;
            /* background-color: #889ba4; */
        }
        
        #info { margin-bottom: 10px; font-size: 1.2rem; color: var(--cell-dark); text-align: center; }
        
        .turn-active {
            color: #a7d170;
            font-weight: bold;
            opacity: 0.8;
            display: inline-block;
        }
        
        .turn-waiting {
            color: #d38e70;
            opacity: 0.8;
            font-style: italic;
            animation: pulse-fade 2s infinite ease;
        }
        
        @keyframes pulse-fade {
            0% { opacity: 0.1; }
            48% { opacity: 0.8; }
            52% { opacity: 0.8; }
            100% { opacity: 0.1; }
        }

        .main-wrapper {
            display: flex; gap: 48px; align-items: flex-start; justify-content: center;
        }
        
        .graveyard {
            width: 160px; min-height: 400px;
            background: var(--cell-light); border: 4px solid #B0B0B0;
            padding: 15px; box-sizing: border-box;
            border-top: 4px solid var(--cover-light); border-left: 4px solid var(--cover-light);
            border-bottom: 4px solid var(--cover-dark); border-right: 4px solid var(--cover-dark);
        }
        .graveyard h3 { 
            text-align: center; margin-top: 0; font-size: 1.1rem; 
            border-bottom: 2px solid var(--cover-dark); padding-bottom: 10px; margin-bottom: 10px;
        }
        .dead-pieces-container {
            display: flex; flex-wrap: wrap; gap: 5px; font-size: 30px;
        }
        .dead-piece { text-shadow: 0 1px 2px rgba(0,0,0,0.3); }

        #board {
            display: grid;
            grid-template-columns: repeat(8, 50px);
            grid-template-rows: repeat(16, 50px);
            border: 4px solid var(--cell-light);
        }
        
        .cell {
            width: 50px; height: 50px;
            display: flex; justify-content: center; align-items: center;
            font-size: 30px; cursor: pointer; user-select: none; position: relative;
        }
        
        .cell.light { background-color: var(--cell-light); }
        .cell.light:nth-child(even) { background-color: var(--cell-dark); }
        .cell.dark { background-color: var(--cell-dark); }
        .cell.dark:nth-child(even) { background-color: var(--cell-light); }
        
        .cell.light.mine-zone, .cell.dark.mine-zone { background-color: var(--cell-dark); box-sizing: border-box;
            border-top: 5px solid var(--cover-light); border-left: 5px solid var(--cover-light); border-bottom: 5px solid var(--cover-dark); border-right: 5px solid var(--cover-dark); }
        
        .cell.light.revealed { background-color: var(--cell-light); box-sizing: border-box;}
        .cell.light.revealed:nth-child(even) { background-color: var(--cell-dark); box-sizing: border-box;}
        .cell.dark.revealed { background-color: var(--cell-dark); box-sizing: border-box;}
        .cell.dark.revealed:nth-child(even) { background-color: var(--cell-light); box-sizing: border-box;}
        
        .cell.exploded { background-color: #F70000 !important; border: 1px solid #c0392b; }
        
        .debug-content { opacity: 0; position: absolute; z-index: 0; font-size: 20px; font-weight: bold; pointer-events: none; }
        .flag { font-family: 'MineSweeperFont', Arial, sans-serif; color: #000000; position: absolute; z-index: 1; font-size: 24px; pointer-events: none; }
        .piece { position: absolute; z-index: 2; }
        .selected { outline: 3px solid #e7c53c; z-index: 3; background-color: rgba(231, 205, 60, 0.3); }
        
        /* Move Indicators */
        .valid-move-dot {
            position: absolute; width: 16px; height: 16px;
            background-color: rgba(0, 0, 0, 0.25); border-radius: 50%;
            z-index: 3; pointer-events: none;
        }
        .valid-capture-ring {
            position: absolute; width: 44px; height: 44px;
            border: 6px solid rgba(0, 0, 0, 0.25); border-radius: 50%;
            box-sizing: border-box; z-index: 3; pointer-events: none;
        }
        
        .number { font-family: 'MineSweeperFont', Arial, sans-serif; font-size: 20px; font-weight: bold; position: absolute; z-index: 1; pointer-events: none; }
        .number.corner { top: 2px; left: 4px; font-size: 14px; }
        
        .c-1 { color: #0100FF; } .c-2 { color: #057D08; } .c-3 { color: #FF0006; } .c-4 { color: #7F027C; }
        .c-5 { color: #840000; } .c-6 { color: #008284; } .c-7 { color: #840084; } .c-8 { color: #757575; }
    </style>
</head>
<body>

    <div style="padding: 24px 0 10px 0;">
        <h1 style="font-family: 'MineSweeperFont', Arial, sans-serif; font-size: 2rem; text-align: center; margin: 0 0 10px 0; color: var(--cell-dark); ">Minesweeper Chess</h1>
        <div style="text-align: center;">
            <select id="theme-switch" style="padding: 5px; font-size: 1rem; border-radius: 4px; cursor: pointer; border: 1px solid #B0B0B0;">
                <option value="minesweeper">Minesweeper Theme</option>
                <option value="chess">Chess Theme</option>
                <option value="green">Green Theme</option>
            </select>
        </div>
    </div>

    <div id="info">Connecting...</div>

    <div class="main-wrapper">
        <div class="graveyard" id="white-graveyard">
            <h3 style="color: white;">White Lost</h3>
            <div class="dead-pieces-container"></div>
        </div>

        <div id="board"></div>

        <div class="graveyard" id="black-graveyard">
            <h3 style="color: black;">Black Lost</h3>
            <div class="dead-pieces-container"></div>
        </div>
    </div>

    <script>
        // theme switcher logic
        document.getElementById('theme-switch').addEventListener('change', (e) => {
            const theme = e.target.value;
            if (theme === 'minesweeper') {
                document.documentElement.style.setProperty('--cell-light', '#C4C4C4');
                document.documentElement.style.setProperty('--cell-dark', '#B0B0B0');

                document.documentElement.style.setProperty('--cover-light', '#ffffff');
                document.documentElement.style.setProperty('--cover-dark', '#808080');
            } else if (theme === 'chess') {
                document.documentElement.style.setProperty('--cell-light', '#e3c599');
                document.documentElement.style.setProperty('--cell-dark', '#cfaf89');
                
                document.documentElement.style.setProperty('--cover-light', '#fcefd3');
                document.documentElement.style.setProperty('--cover-dark', '#b2987a');
            } else if (theme === 'green') {
                document.documentElement.style.setProperty('--cell-light', '#dfe0b8');
                document.documentElement.style.setProperty('--cell-dark', '#8eae6a');

                document.documentElement.style.setProperty('--cover-light', '#feffd0');
                document.documentElement.style.setProperty('--cover-dark', '#769652');
            }
        });

        // client-side move validation for preview indacators
        function isPathClear(startX, startY, endX, endY, pieces) {
            const dx = Math.sign(endX - startX);
            const dy = Math.sign(endY - startY);
            let x = startX + dx, y = startY + dy;
            while (x !== endX || y !== endY) {
                if (pieces.some(p => p.x === x && p.y === y)) return false;
                x += dx; y += dy;
            }
            return true;
        }

        function isValidMove(piece, toX, toY, pieces) {
            const dx = toX - piece.x, dy = toY - piece.y;
            const adx = Math.abs(dx), ady = Math.abs(dy);
            if (pieces.some(p => p.x === toX && p.y === toY && p.color === piece.color)) return false;
            const targetPiece = pieces.find(p => p.x === toX && p.y === toY);

            switch (piece.type) {
                case 'N': return (adx === 2 && ady === 1) || (adx === 1 && ady === 2);
                case 'K': return adx <= 1 && ady <= 1;
                case 'R': if (dx !== 0 && dy !== 0) return false; return isPathClear(piece.x, piece.y, toX, toY, pieces);
                case 'B': if (adx !== ady) return false; return isPathClear(piece.x, piece.y, toX, toY, pieces);
                case 'Q': if (dx !== 0 && dy !== 0 && adx !== ady) return false; return isPathClear(piece.x, piece.y, toX, toY, pieces);
                case 'P': 
                    const dir = piece.color === 'white' ? -1 : 1;
                    const startRow = piece.color === 'white' ? 14 : 1;
                    if (dx === 0) {
                        if (dy === dir && !targetPiece) return true;
                        if (dy === dir * 2 && piece.y === startRow && !targetPiece && isPathClear(piece.x, piece.y, toX, toY, pieces)) return true;
                    } else if (adx === 1 && dy === dir && targetPiece) return true;
                    return false;
            }
            return false;
        }

        const boardEl = document.getElementById('board');
        const infoEl = document.getElementById('info');
        const ws = new WebSocket('ws://localhost:8080');

        let myColor = null;
        let currentTurn = 'white';
        let selectedPiece = null;
        let isGameOver = false;

        const pieceIcons = {
            'white': { 'K': '♔', 'Q': '♕', 'R': '♖', 'B': '♗', 'N': '♘', 'P': '♙' },
            'black': { 'K': '♚', 'Q': '♛', 'R': '♜', 'B': '♝', 'N': '♞', 'P': '♟' }
        };

        for (let y = 0; y < 16; y++) {
            for (let x = 0; x < 8; x++) {
                const cell = document.createElement('div');
                cell.className = `cell ${(x + y) % 2 === 0 ? 'light' : 'dark'}`;
                if (y >= 2 && y <= 13) cell.classList.add('mine-zone'); 
                cell.dataset.x = x; cell.dataset.y = y;
                
                cell.addEventListener('click', () => handleCellClick(x, y));
                cell.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                    handleFlagClick(x, y);
                });
                boardEl.appendChild(cell);
            }
        }

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            
            // handle local explosion popup
            if (data.type === 'EXPLOSION') {
                setTimeout(() => alert(data.message), 50);
                return;
            }

            // handle game over broadcast
            if (data.type === 'GAME_OVER') {
                isGameOver = true;
                infoEl.innerText = `GAME OVER! ${data.winner.toUpperCase()} WINS!`;
                infoEl.style.color = '#F70000';
                infoEl.style.fontWeight = 'bold';
                setTimeout(() => alert(`Game Over! ${data.winner.toUpperCase()} wins!\nReason: ${data.reason}`), 100);
                return;
            }

            if (data.type === 'STATE_UPDATE') {
                myColor = data.color;
                currentTurn = data.turn;
                
                if (data.winner) {
                    isGameOver = true;
                    infoEl.innerText = `GAME OVER! ${data.winner.toUpperCase()} WINS!`;
                } else {
                    if (currentTurn === myColor) {
                        infoEl.innerHTML = `You are ${myColor.toUpperCase()} TEAM<br><span class="turn-active">YOUR TURN</span>`;
                    } else {
                        infoEl.innerHTML = `You are ${myColor.toUpperCase()} TEAM<br><span class="turn-waiting">(Waiting for opponent...)</span>`;
                    }
                }
                
                renderBoard(data.pieces, data.grid, data.truthGrid, data.flags);
                renderGraveyards(data.deadPieces);
            }
        };

        function handleFlagClick(x, y) {
            if (isGameOver) return;
            if (myColor === 'white' || myColor === 'black') {
                ws.send(JSON.stringify({ type: 'FLAG', x: x, y: y }));
            }
        }

        function handleCellClick(x, y) {
            if (isGameOver) return;
            if (selectedPiece && currentTurn === myColor) {
                ws.send(JSON.stringify({ type: 'MOVE', id: selectedPiece, toX: x, toY: y }));
                selectedPiece = null;
            }
        }

        function getCell(x, y) { return document.querySelector(`.cell[data-x='${x}'][data-y='${y}']`); }

        function renderGraveyards(deadPieces) {
            const whiteContainer = document.querySelector('#white-graveyard .dead-pieces-container');
            const blackContainer = document.querySelector('#black-graveyard .dead-pieces-container');
            
            whiteContainer.innerHTML = '';
            blackContainer.innerHTML = '';
            
            deadPieces.white.forEach(p => {
                const div = document.createElement('div');
                div.className = 'dead-piece';
                div.innerText = pieceIcons.white[p.type];
                div.style.color = '#fff';
                whiteContainer.appendChild(div);
            });
            
            deadPieces.black.forEach(p => {
                const div = document.createElement('div');
                div.className = 'dead-piece';
                div.innerText = pieceIcons.black[p.type];
                div.style.color = '#000';
                blackContainer.appendChild(div);
            });
        }

        function renderBoard(pieces, visibleGrid, truthGrid, flags) {
            document.querySelectorAll('.cell').forEach(cell => {
                cell.innerHTML = '';
                cell.className = `cell ${(cell.dataset.x + cell.dataset.y) % 2 === 0 ? 'light' : 'dark'}`;
                if (cell.dataset.y >= 2 && cell.dataset.y <= 13) cell.classList.add('mine-zone'); 
            });

            for (let y = 2; y <= 13; y++) {
                for (let x = 0; x < 8; x++) {
                    const cell = getCell(x, y);
                    const cellValue = visibleGrid[y][x];
                    const isRevealed = cellValue !== null;
                    const hasPiece = pieces.some(p => p.x === x && p.y === y);

                    // debug truth
                    if (truthGrid && truthGrid[y] && !isRevealed) {
                        const truth = truthGrid[y][x];
                        const debugSpan = document.createElement('span');
                        debugSpan.className = 'debug-content ' + (truth === 'M' ? '' : 'c-' + truth);
                        debugSpan.innerText = truth === 'M' ? '💣' : (truth > 0 ? truth : '');
                        cell.appendChild(debugSpan);
                    }

                    if (isRevealed) {
                        cell.classList.remove('mine-zone');
                        
                        if (cellValue === 'X') {
                            cell.classList.add('exploded');
                            const span = document.createElement('span');
                            span.className = 'number';
                            span.innerText = '💣';
                            cell.appendChild(span);
                        } else {
                            cell.classList.add('revealed');
                            if (cellValue > 0) {
                                const span = document.createElement('span');
                                span.className = `number c-${cellValue}`;
                                if (hasPiece) span.classList.add('corner');
                                span.innerText = cellValue;
                                cell.appendChild(span);
                            }
                        }
                    } else if (flags && flags[y] && flags[y][x]) {
                        const flagSpan = document.createElement('span');
                        flagSpan.className = 'flag';
                        flagSpan.innerText = '`';
                        cell.appendChild(flagSpan);
                    }
                }
            }

            pieces.forEach(p => {
                const cell = getCell(p.x, p.y);
                const pieceDiv = document.createElement('div');
                pieceDiv.className = 'piece';
                pieceDiv.innerText = pieceIcons[p.color][p.type];
                pieceDiv.style.color = p.color === 'white' ? '#fff' : '#000';
                if (selectedPiece === p.id) pieceDiv.classList.add('selected');
                
                pieceDiv.addEventListener('click', (e) => {
                    if (isGameOver) return; // prevent selection if game over
                    if (p.color === myColor && currentTurn === myColor) {
                        e.stopPropagation(); 
                        selectedPiece = p.id;
                        renderBoard(pieces, visibleGrid, truthGrid, flags); 
                    }
                });
                cell.appendChild(pieceDiv);
            });

            // draw valid move indicators after rendering pieces
            if (selectedPiece) {
                const selectedObj = pieces.find(p => p.id === selectedPiece);
                if (selectedObj) {
                    for (let y = 0; y < 16; y++) {
                        for (let x = 0; x < 8; x++) {
                            if (isValidMove(selectedObj, x, y, pieces)) {
                                const cell = getCell(x, y);
                                const targetPiece = pieces.find(p => p.x === x && p.y === y);
                                const indicator = document.createElement('div');
                                //  ring for capture / dot for empty square
                                indicator.className = targetPiece ? 'valid-capture-ring' : 'valid-move-dot';
                                cell.appendChild(indicator);
                            }
                        }
                    }
                }
            }
        }

        function debug(opacity = 0.15) {
            const debugElements = document.querySelectorAll('.debug-content');
            
            debugElements.forEach(element => {
                element.style.opacity = opacity;
            });
            
            console.log(`Debug opacity set to: ${opacity}`);
        }
    </script>
</body>
</html>
